<div class="row">
  <div class="col-xs-12">
    <button class="btn btn-primary btn-block" (click)="onAddItem()">
      Add Grocery Item
    </button>
  </div>
</div>
<div class="row">
  <div class="col-xs-12">
    <app-grocery-item
      *ngFor="let item of groceries"
      [item]="item"
      (purchasedChanged)="onPurchasedChanged($event, item)"
    ></app-grocery-item>
  </div>
</div>
